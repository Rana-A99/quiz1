# ":" after name
name: ML Docker Pipeline
# identation
on:
 push:
   branches:
      main

# identation
jobs:
  build:
  runs-on: ubuntu-latest
  steps:
  - name: Checkout repository
  uses: actions/checkout@v4

  #remove " . "
  -name: Build docker image
  run: docker build ml-project

  run-pipeline:
  #add needs
  needs: build
  runs-on: ubuntu-latest
  steps:
  - name: Run container
    run: docker run ml-project
    
  - name: fetch data
    run: fetch data
    
  - name: train model
    run: train model
    uses: train.py

   #remove run and put uses instead
  - name: Upload model
   uses: actions/upload/artivacts@v4
   with:
     name: upload_model.py
     path: upload_model.py
